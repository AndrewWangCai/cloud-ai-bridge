# Nginx 反代 + HTTPS（WebSocket 直通，遥控/HMR 必需）。
# 安装：
#   sudo cp deploy/nginx-conduit.conf /etc/nginx/sites-available/conduit
#   sudo ln -s /etc/nginx/sites-available/conduit /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d your.domain.com        # 自动签发证书并改写 server 块
#   sudo nginx -t && sudo systemctl reload nginx

# WebSocket 升级所需：根据 Upgrade 头决定 Connection
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name your.domain.com;          # 改成你的域名
    # certbot 会自动加 443 与跳转；裸 IP 也可临时用 80（但 cookie Secure 需 HTTPS）

    client_max_body_size 50m;             # 允许较大上传

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;        # /client 与 /preview WS
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;          # 长连接终端不被中断
        proxy_send_timeout 3600s;
        proxy_buffering off;               # 实时输出不缓冲
    }
}
