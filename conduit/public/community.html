<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloud AI Bridge · 社区</title>
<style>
  :root{--bg:#F4F3EE;--surface:#fff;--border:#E7E4DA;--text:#2A2A27;--muted:#76746B;--accent:#C96442;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);padding:1rem;max-width:1100px;margin:0 auto;}
  h1{font-size:1.25rem;display:flex;align-items:center;gap:.5rem;margin-bottom:.2rem;}
  .muted{color:var(--muted);font-size:.85rem;}
  a.back{font-size:.8rem;color:var(--accent);text-decoration:none;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem;margin-top:1rem;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1rem;display:flex;flex-direction:column;gap:.4rem;}
  .card h3{font-size:1rem;}
  .badge{font-size:.68rem;padding:.1rem .4rem;border-radius:6px;background:var(--bg);color:var(--muted);align-self:flex-start;}
  .badge.fork{background:#E6F2EA;color:#3F8F5B;}
  .desc{font-size:.82rem;color:var(--muted);min-height:2.4em;}
  .row{display:flex;gap:.5rem;margin-top:.3rem;}
  button{font-family:inherit;cursor:pointer;border:1px solid var(--border);background:var(--surface);border-radius:8px;padding:.35rem .7rem;font-size:.8rem;color:var(--text);}
  button.accent{background:var(--accent);color:#fff;border-color:var(--accent);}
  .gate{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.2rem;margin-top:1rem;}
  /* 观赏弹层 */
  #viewer{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;padding:1rem;z-index:50;}
  #viewer .box{background:#fff;border-radius:12px;width:min(960px,100%);height:min(80vh,100%);display:flex;flex-direction:column;overflow:hidden;}
  #viewer .bar{display:flex;justify-content:space-between;align-items:center;padding:.5rem .8rem;border-bottom:1px solid var(--border);}
  #viewer iframe{flex:1;border:0;width:100%;background:#fff;}
</style>
</head>
<body>
  <h1>🌃 社区作品</h1>
  <a class="back" href="/">← 返回应用</a>
  <p class="muted">用户自愿公开的项目。仅供观赏；作者开放「可获取」的才可下载。</p>
  <div id="gate" class="gate" style="display:none;"></div>
  <div id="grid" class="grid"></div>

  <div id="viewer" onclick="if(event.target.id==='viewer')closeViewer()">
    <div class="box">
      <div class="bar"><b id="viewerTitle"></b><button onclick="closeViewer()">关闭</button></div>
      <iframe id="viewerFrame" sandbox="allow-scripts allow-popups allow-forms"></iframe>
    </div>
  </div>

<script>
const $ = (id) => document.getElementById(id);
function esc(s){ return String(s||'').replace(/[&<>"]/g,(c)=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
async function load(){
  let data;
  try { const r = await fetch('/api/community'); if(!r.ok) throw new Error('需登录'); data = await r.json(); }
  catch(e){ $('gate').style.display='block'; $('gate').innerHTML='请先<a href="/">登录</a>后浏览社区。'; return; }
  const entries = data.entries||[];
  if(!entries.length){ $('grid').innerHTML='<p class="muted">还没有公开的作品，去发布你的第一个吧！</p>'; return; }
  $('grid').innerHTML = entries.map((e)=>`
    <div class="card">
      <span class="badge ${e.level==='fork'?'fork':''}">${e.level==='fork'?'可获取':'仅观赏'}</span>
      <h3>${esc(e.title)}</h3>
      <div class="muted">by ${esc(e.author)}</div>
      <div class="desc">${esc(e.desc)||'<span style=opacity:.5>（无说明）</span>'}</div>
      <div class="row">
        <button class="accent" onclick="view('${esc(e.entryId)}','${esc(e.title)}')">观赏</button>
        ${e.level==='fork'?`<button onclick="dl('${esc(e.entryId)}')">下载</button>`:''}
      </div>
    </div>`).join('');
}
function view(id,title){ $('viewerTitle').textContent=title; $('viewerFrame').src='/community-view/'+encodeURIComponent(id)+'/'; $('viewer').style.display='flex'; }
function closeViewer(){ $('viewer').style.display='none'; $('viewerFrame').src='about:blank'; }
function dl(id){ window.open('/api/community/'+encodeURIComponent(id)+'/download','_blank'); }
load();
</script>
</body>
</html>
